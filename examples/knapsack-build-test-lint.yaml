# -----------------------------------------------------------------------------
# Hyku knapsack — caller workflow (copy to YOUR_REPO/.github/workflows/)
#
# Before CI can build/test, prepare the knapsack repo root:
#
# 1. Solr config for the root Dockerfile (COPY solr/...):
#    ln -sfn hyrax-webapp/solr solr
#
# 2. Add a Solr image stage to your root Dockerfile, e.g.:
#
#    # Use a Solr version with patched Log4j (CVE-2021-44228)
#    FROM solr:8.11.2 AS hyku-solr
#    ENV SOLR_USER="solr" \
#        SOLR_GROUP="solr"
#    USER root
#    COPY --chown=solr:solr solr/security.json /var/solr/data/security.json
#    USER $SOLR_USER
#
# Docker Compose service names must match what the reusable workflows expect:
#   - `web` for lint/test (docker compose run/exec web)
#   - `solr` for Solr setup in test
#
# Dockerfile target names in `components` below must match your compose build targets.
#
# Pin `uses: notch8/actions/...@REF` to a release tag (e.g. v1.0.9) instead of main.
# -----------------------------------------------------------------------------
name: "Build Test Lint"
run-name: Build Test Lint of ${{ github.ref_name }} by @${{ github.actor }}

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debug_step:
        required: false
        description: "Pause the build job to debug using tmate (lint/test are only debuggable when those workflows are run directly via workflow_dispatch)"
        type: choice
        default: ""
        options:
          - ""
          - build

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build:
    permissions: write-all
    uses: notch8/actions/.github/workflows/build.yaml@v1.0.9
    secrets: inherit
    with:
      components: '["hyku-web","hyku-worker","hyku-solr"]'
      debug_step: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_step || '' }}

  lint:
    needs: build
    uses: notch8/actions/.github/workflows/lint.yaml@v1.0.9
    secrets: inherit
    with:
      rubocop_cmd: "cd .. && bundle exec rubocop --parallel --format progress --format junit --out rubocop.xml --display-only-failed"

  test:
    needs: build
    uses: notch8/actions/.github/workflows/test.yaml@v1.0.9
    secrets: inherit
    with:
      confdir: "/app/samvera/hyrax-webapp/solr/conf"
      solrTarget: hyku-solr
      rspec_cmd: "cd .. && gem install semaphore_test_boosters && bundle && rspec_booster --job $CI_NODE_INDEX/$CI_NODE_TOTAL"

  reports:
    if: always()
    needs: [test, lint]
    uses: notch8/actions/.github/workflows/report.yaml@v1.0.9
