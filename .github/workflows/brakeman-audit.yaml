name: "Brakeman Audit"
run-name: Brakeman Audit (${{ github.ref_name }}) by @${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      subdir:
        default: '.'
        type: string
      tag:
        required: false
        type: string
      webTarget:
        description: "Used to set your target for the web image"
        required: false
        type: string
      debug_enabled:
        description: "Enable tmate debug session"
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      subdir:
        default: '.'
        type: string
      tag:
        required: false
        type: string
      webTarget:
        description: "Used to set your target for the web image"
        required: false
        type: string
      debug_enabled:
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io

jobs:
  brakeman-audit:
    runs-on: ubuntu-latest
    steps:
      - id: setup
        name: Setup
        uses: notch8/actions/setup-env@v1.0.9
        with:
          tag: ${{ inputs.tag }}
          token: ${{ secrets.CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}
          subdir: ${{ inputs.subdir }}
      - name: Github Container Login
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull web image to prevent build
        if: ${{ inputs.webTarget != '' }}
        run: >-
          cd ${{ inputs.subdir }};
          touch .env.development;
          touch .env;
          docker compose pull web
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ inputs.debug_enabled }}
        with:
          limit-access-to-actor: true
      - name: Run Brakeman Audit and Copy Report
        run: |
          cd ${{ inputs.subdir }}
          REPORT_DIR="$GITHUB_WORKSPACE/${{ inputs.subdir }}"
          docker compose run --rm -v "${REPORT_DIR}:/report" web sh -c "gem install brakeman && brakeman --force -A --no-assume-routes --no-color -f text -o /report/brakeman-audit-report.txt"
          AUDIT_EXIT=$?
          if [ ! -f "${REPORT_DIR}/brakeman-audit-report.txt" ]; then
            echo "Report file was not created; audit or gem install likely failed."
            exit 1
          fi
          exit 0
      - name: Publish Brakeman Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brakeman-audit-report
          path: ${{ inputs.subdir }}/brakeman-audit-report.txt
